services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_CTA_URL=${VITE_CTA_URL}
        - VITE_WHATSAPP_URL=${VITE_WHATSAPP_URL}
        - VITE_TELEGRAM_URL=${VITE_TELEGRAM_URL}
        - VITE_DEVELOPED_BY_URL=${VITE_DEVELOPED_BY_URL}
        - VITE_BASE_PATH=/
    ports:
      - "4173:4173"
    environment:
      - VITE_CTA_URL=${VITE_CTA_URL}
      - VITE_WHATSAPP_URL=${VITE_WHATSAPP_URL}
      - VITE_TELEGRAM_URL=${VITE_TELEGRAM_URL}
      - VITE_DEVELOPED_BY_URL=${VITE_DEVELOPED_BY_URL}
    command: serve -s dist -l 4173
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - julia_net

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - app
    dns:
      - 1.1.1.1
      - 1.0.0.1
      - 8.8.8.8
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - julia_net
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --protocol
      - auto
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN}
      - --url
      - http://app:4173

networks:
  julia_net:

volumes:
  cloudflared-config: