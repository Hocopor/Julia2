services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_CTA_URL=${VITE_CTA_URL}
        - VITE_WHATSAPP_URL=${VITE_WHATSAPP_URL}
        - VITE_TELEGRAM_URL=${VITE_TELEGRAM_URL}
        - VITE_VK_URL=${VITE_VK_URL}
        - VITE_DEVELOPED_BY_URL=${VITE_DEVELOPED_BY_URL}
        - VITE_BASE_PATH=${VITE_BASE_PATH:-/}
        - VITE_ASSET_BASE_URL=${VITE_ASSET_BASE_URL}
    ports:
      - "127.0.0.1:${APP_PORT:-4180}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
